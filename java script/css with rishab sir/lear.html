<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layout Designing & Understanding</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
      font-size: medium;
      font-weight: bold;
      /* outline: 1px solid blue; */
    }

    body {
      margin: 0;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 32px;
      background-color: aquamarine;
    }

    .nav-links a {
      margin-right: 20px;
      text-decoration: none;
      color: black;
    }

    .container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: url("https://1000logos.net/wp-content/uploads/2016/10/Amazon-Logo-2000.png");
      background-repeat: no-repeat;
      background-size: cover;
      gap: 20px;
    }

    .box {
      width: 150px;
      height: 150px;
      background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSxYvcV6QP-EahnBrtFbQOJSpAsNgOm9AW7_w&s");
      background-repeat: no-repeat;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: rgba(255,255,255,0.8);
    }
  </style>
</head>

<body>

  <header class="navbar">
    <div class="logo">MyLogo</div>

    <nav class="nav-links">
      <a href="https://www.google.com/" target="_blank">Google</a>
      <a href="https://www.facebook.com/" target="_blank">Facebook</a>
      <a href="https://www.facebook.com/" target="_blank">Facebook</a>
      <a href="https://www.facebook.com/" target="_blank">Facebook</a>
    </nav>
  </header>

  <div class="container">
    <div class="box">Box 1</div>
    <div class="box">Box 2</div>
    <div class="box">Box 3</div>
  </div>

</body>
</html>

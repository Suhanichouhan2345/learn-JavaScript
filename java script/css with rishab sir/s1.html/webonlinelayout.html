<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
  *{
    margin: 0;
}
.body,html{
    background-color: #93c5e8; 
}
    .welcome{
     height: calc(100vh - 140px);
  text-align: center;
  justify-content: center;
  color: white;
  transform: (20% 20%);
   background-color: #93c5e8;
  padding: 30px;
  text-shadow: 3px 3px 10px rgb(35, 57, 76);
  width: 90%;
 transition: all 1s ease-out;
  display: flex;                 
    flex-direction: column;        
    justify-content: center;       
    align-items: center;        
}
.welcome h1 {
  font-size: 3vw;
}

.welcome p {
  font-size: 2vw;
}
.welcome:hover{
   color: rgb(21, 20, 20);
   transition: margin-right 4s ease-in-out 1s;
   text-shadow: 3px 3px 10px rgb(107, 234, 71);
}
.welcome:hover h1{
  transform: scale(1.115);
  text-shadow: 5px 5px 12px rgb(112, 137, 21);
}

.welcome:hover p{
  transform: scale(1.115);
  text-shadow: 3px 3px 10px rgb(209, 14, 14);
}

</style>
<body>
    <div class="welcome">
  <h1>Online Application</h1><br>
  <p>“In the world of clicks, we find our way,</p>
<p>Online applications save the day.</p>
<p>“From pen to pixel, we have moved ahead,</p>
<p>Online applications make the path widespread.</p>

</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REACT</title>
</head>
<style>

*{
 margin: 0;
font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
}
.body,html{
   background-color: #6c0656;   
}
.hearder{
    display: flex;
      background-color: #335387; 
    color: #e5e7eb;
    padding: 32px;
    justify-content: center;
    position: sticky;
    top: 0;
      text-shadow: 5px 5px 2px rgb(17, 27, 214);
      width: 98%;
}
.main{
 display: flex;
 
 flex: 1;
 
}
.box{
    position: relative;
   margin-top: 20%;
   margin-left: 20%;
    transform: translate(-50%,-50%);
    height: 250px;
    width: 200px;
    border-radius: 15px;
    border: 1px solid palevioletred;
     overflow: hidden;
     object-fit: cover;
     justify-content: center;
     display: flex;
     align-items: center;
}
</style>
<body>
    <div class="hearder"><h2>REACT</h2> </div>
    <div class="main">
         <div id="one" class="box">
                <img src="https://c.pxhere.com/photos/27/10/bloom_blossom_close_up_flora_flower_HD_wallpaper_macro_plant-915298.jpg!d">
            </div>
            <div id="two" class="box">
                 <img src="https://tse4.mm.bing.net/th/id/OIP.AC3hIjU2Nu43zj65gk5V2gHaEK?pid=Api&P=0&h=180">
            </div>
            <div id="three" class="box">
                 <img src="http://wallpapercave.com/wp/vWYrpvl.jpg">
            </div>
            <div id="four" class="box">
                 <img src="https://tse4.mm.bing.net/th/id/OIP.4-fYG3T_U7C8UKUunz9sJAHaE8?pid=Api&P=0&h=180">
            </div>
    </div>
     <div class="footer"> </div>
</body>
</html>

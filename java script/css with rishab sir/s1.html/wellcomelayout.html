<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
  *{
    margin: 0;
}
.body,html{
    background-color: #021a53; 
}
    .welcome{
     height: calc(100vh - 140px);
  text-align: center;
  justify-content: center;
  color: white;
  transform: (20% 20%);
   background-color: #021a53;
  padding: 30px;
  text-shadow: 3px 3px 10px rgb(114, 13, 222);
  width: 90%;
 transition: all 1s ease-out;
  display: flex;                 
    flex-direction: column;        
    justify-content: center;       
    align-items: center;        
}
.welcome h1 {
  font-size: 3vw;
}

.welcome p {
  font-size: 2vw;
}
.welcome:hover{
   color: rgb(129, 235, 183);
   transition: margin-right 4s ease-in-out 1s;
   text-shadow: 3px 3px 10px rgb(117, 17, 239);
}
.welcome:hover h1{
  transform: scale(1.115);
  text-shadow: 5px 5px 12px black;
}

.welcome:hover p{
  transform: scale(1.115);
  text-shadow: 3px 3px 10px black;
}

</style>
<body>
    <div class="welcome">
  <h1>Welcome to My Website</h1><br>
  <p>Life is a journey, not a race.</p>
<p>Every effort you make today shapes your tomorrow.</p>
<p>Even small progress is still progress.</p>
<p>Practice every single day</p>

</div>
</body>
</html>

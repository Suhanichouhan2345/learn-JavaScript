<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<form>
    <label>Email</label><br>
    <input type="email" id="email" placeholder="Enter Your Email" required>
    <br><br>

    <label>Password</label><br>
    <input type="text" id="pass" placeholder="Enter Your password" required>
    <br><br>

    <button type="submit" onclick="login(event)">Login</button>
</form>

<p id="demo"></p>
<p id="msg"></p>

<script>
function login(event) {
    event.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("pass").value;
    function passwordValidation(password) {
    const passwordRegex = /^(?=.[A-Za-z])(?=.\d)[A-Za-z\d]{8,}$/;
     return passwordRegex.test(password);

     if (passwordValidation(password) === true) {
        const data = { email, password };
        document.getElementById("demo").innerHTML = "Login Successful";
    } else {
        document.getElementById("msg").innerHTML = "Invalid Password";
    }
}

}

</script>

</body>
</html>
